syntax = "proto3";


message CmdVel {
  optional float linear_x = 1;
  optional float angular_z = 2;
}

message HardwareCmd {
  optional uint32 vacuum_state = 2;
  optional uint32 side_brushcmd = 3;
}

message syncMsgRx {
    optional uint32 pi_initial_time_stamp_us = 1;
    optional uint32 stm32_rx_time_stamp_us = 2;
    optional uint32 stm32_tx_time_stamp_us = 3;    
}
message RxMsg {
  optional CmdVel cmd_vel = 1;
  optional HardwareCmd hardware_cmd = 2;
  optional syncMsgRx sync_msg_rx = 3;
}